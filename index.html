<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZukiScator - Advanced Lua Obfuscator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link href="https://fonts.cdnfonts.com/css/minecraft-3" rel="stylesheet">

  <style>
    body { font-family: 'Minecraft', system-ui, sans-serif; }
    h1, h2, h3, button, input, select, label { font-family: 'Minecraft', system-ui, sans-serif; }
    .glow { box-shadow: 0 0 25px rgba(249, 115, 22, 0.4); }
    .card:hover { transform: translateY(-8px); }
    button { letter-spacing: 4px; text-shadow: 2px 2px 0 #000; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <nav class="bg-black/70 backdrop-blur-md border-b border-orange-500/20 fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-gradient-to-br from-orange-500 to-amber-500 rounded-xl flex items-center justify-center text-2xl font-bold">Y</div>
        <h1 class="text-2xl font-bold tracking-tight">Zuki<span class="text-orange-500">Scator</span></h1>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto pt-24 pb-16 px-6">
    <div class="text-center mb-10">
      <h2 class="text-5xl font-bold mb-3">Advanced Lua Obfuscator</h2>
      <p class="text-zinc-400 text-lg">VM + String Encryption • Very Hard to Deobf</p>
    </div>

    <div class="card bg-zinc-900/70 border border-zinc-700 rounded-3xl p-8 glow">
      <form id="form" class="space-y-8">
        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Upload Lua Script</label>
          <div class="border-2 border-dashed border-zinc-700 hover:border-orange-500 rounded-2xl p-10 text-center transition-colors" id="drop-zone">
            <i class="fa-solid fa-cloud-arrow-up text-5xl text-orange-500 mb-4"></i>
            <p class="text-zinc-300 font-medium">Drop your .lua or .txt file here</p>
            <p class="text-zinc-500 text-sm mt-1">or</p>
            <label class="cursor-pointer inline-block mt-4 px-6 py-3 bg-orange-500 hover:bg-orange-600 rounded-xl text-sm font-semibold transition-colors">
              Select File
              <input type="file" id="file" accept=".lua,.txt" class="hidden" />
            </label>
          </div>
          <div id="file-info" class="mt-3 text-sm text-zinc-400"></div>
        </div>

        <div>
          <label class="block text-sm font-medium text-zinc-400 mb-2">Encryption Key <span class="text-red-500">(Required)</span></label>
          <div class="relative">
            <input type="text" id="key" maxlength="64" required
                   class="w-full bg-zinc-800 border border-zinc-700 focus:border-orange-500 rounded-2xl px-6 py-4 text-lg outline-none transition-all"
                   placeholder="Enter strong encryption key..." />
            <div class="absolute right-6 top-1/2 -translate-y-1/2 text-xs text-zinc-500">
              <span id="key-length">0</span>/64
            </div>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">Obfuscation Level</label>
            <select id="level" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              <option value="1">Basic</option>
              <option value="2" selected>Advanced</option>
              <option value="3">Extreme (VM)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-2">Extra Protection</label>
            <div class="space-y-2">
              <label class="flex items-center gap-2">
                <input type="checkbox" id="anti-debug" checked class="w-5 h-5 accent-orange-500" />
                <span class="text-sm">Anti-Debug</span>
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="junk-code" checked class="w-5 h-5 accent-orange-500" />
                <span class="text-sm">Junk Code</span>
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="string-enc" checked class="w-5 h-5 accent-orange-500" />
                <span class="text-sm">String Encryption</span>
              </label>
              <label class="flex items-center gap-2">
                <input type="checkbox" id="vm" checked class="w-5 h-5 accent-orange-500" />
                <span class="text-sm">VM Protection (Strongest)</span>
              </label>
            </div>
          </div>
        </div>

        <button type="submit" id="obfuscate-btn"
          class="w-full py-6 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 rounded-2xl text-xl font-bold tracking-wider transition-all active:scale-95">
          <i class="fa-solid fa-shield-halved mr-3"></i>
          OBFUSCATE SCRIPT
        </button>
      </form>
    </div>
  </div>

  <script>
    let currentFile = null;

    const abc = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";
    const generateRandomString = (length) => Array.from({length}, () => abc[Math.floor(Math.random() * abc.length)]).join('');

    const xorEncrypt = (str, key) => {
      const result = [];
      for (let i = 0; i < str.length; i++) {
        result.push(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
      }
      return result;
    };

    const fileInput = document.getElementById('file');
    const dropZone = document.getElementById('drop-zone');
    const fileInfo = document.getElementById('file-info');
    const keyInput = document.getElementById('key');
    const keyLength = document.getElementById('key-length');

    keyInput.addEventListener('input', () => keyLength.textContent = keyInput.value.length);

    ['dragover', 'dragenter'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.style.borderColor = '#f97316'; }));
    ['dragleave', 'dragend'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.style.borderColor = ''));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.style.borderColor = ''; if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.name.match(/\.(lua|txt)$/i)) return alert("Only .lua or .txt files allowed!");
      currentFile = file;
      fileInfo.innerHTML = `<span class="text-green-400">✓ \( {file.name}</span> <span class="text-zinc-500">( \){(file.size/1024).toFixed(1)} KB)</span>`;
    }

    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();

      const key = keyInput.value.trim();
      if (!key) return alert("Encryption Key is required!");
      if (!currentFile) return alert("Please upload a script first!");

      const reader = new FileReader();
      reader.onload = () => {
        const script = reader.result.trim();
        const encrypted = xorEncrypt(script, key);

        let output = `--[[ ZukiScator v0.0.5 - VM Protection ]]--\n`;
        output += `--[[ https://zukisworld.vercel.app/# ]]--\n\n`;
        output += `local k = "${key}";\n`;
        output += `local d = {${encrypted.join(',')}};\n\n`;

        if (document.getElementById('anti-debug').checked) {
          output += `if _G.debug or _G.hookfunction or debug.getinfo then print("zuki is mad u deobf dis masterpiece") return end\n\n`;
        }

        // VM Decrypt + Execute
        output += `local function vm_decrypt()\n`;
        output += `  local s = ""\n`;
        output += `  for i=1,#d do s = s .. string.char(d[i] \~ k:byte((i-1)%#k+1)) end\n`;
        output += `  return s\n`;
        output += `end\n\n`;

        if (document.getElementById('string-enc').checked) {
          output += `local function dec(str)\n  local r="" for i=1,#str do r=r..string.char(str:byte(i)\~k:byte((i-1)%#k+1)) end return r end\n\n`;
        }

        if (document.getElementById('junk-code').checked) {
          output += `local _=math.random(1,999999); local ___="${generateRandomString(90)}";\n\n`;
        }

        if (document.getElementById('vm').checked) {
          output += `-- VM Protection\n`;
          output += `local function run_vm(code) loadstring(code)() end\n`;
          output += `run_vm(vm_decrypt())\n`;
        } else {
          output += `loadstring(vm_decrypt())()\n`;
        }

        output += `-- Protected by ZukiScator`;

        const blob = new Blob([output], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Protected_${currentFile.name}`;
        a.click();
        URL.revokeObjectURL(url);

      };
      reader.readAsText(currentFile);
    });
  </script>
</body>
</html>
